<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMD Messaging Web Client</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #111; color: #eee; }
    .app { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { margin-top: 0; }
    #log { height: 60vh; overflow-y: auto; background: #121212; border: 1px solid #333; padding: 12px; border-radius: 8px; white-space: pre-wrap; font-family: Menlo, Consolas, monospace; }
    #log .system { color: #9be5ff; }
    #log .error { color: #ff8a8a; }
    #log .command { color: #c7c7ff; }
    #controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 12px; }
    #input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0d0d0d; color: #eee; }
    button { padding: 12px 18px; border: none; border-radius: 8px; background: #0078d4; color: #fff; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status { margin: 12px 0; }
  </style>
</head>
<body>
  <div class="app">
    <h1>CMD Messaging Web Client</h1>
    <div class="status" id="status">Connecting...</div>
    <div id="log"></div>
    <div id="controls">
      <input id="input" type="text" placeholder="Type a command or chat message" autocomplete="off" />
      <button id="send">Send</button>
    </div>
    <p>Use <code>REGISTER username password</code> or <code>AUTH username password</code> to log in.</p>
    <p>After login, use commands like <code>/users</code>, <code>/friend username</code>, <code>/dm username</code>, <code>/group username1 username2</code>, <code>/help</code>.</p>
  </div>
  <script src="./client.js"></script>
</body>
</html>
